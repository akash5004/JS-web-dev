<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom- create new element</title>
</head>
<body style="background-color: black; color: antiquewhite;">

</body>

<script>
    const div= document.createElement("div")
    console.log(div);    //this creates a element div

    div.className="main-div"  //sets class="main-div"
    div.id=Math.round(Math.random()*10+1) //this generates new id each time ///just for fun😂
    div.innerText="Created a new element using javascript(dom manupulation)"

    div.setAttribute("title" , "Title_1")  //setAttribute is used to create custom attributes

    document.body.appendChild(div)   //this brings these on browser
</script>
</html>
